<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96d"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#c9a84c" stroke-width="1.5" opacity="0.9"/>

  <!-- Outer ring glow -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- Lock body -->
  <rect x="18" y="30" width="28" height="20" rx="4" fill="url(#gold2)" filter="url(#glow)"/>
  
  <!-- Lock body shine -->
  <rect x="18" y="30" width="28" height="8" rx="4" fill="url(#gold)" opacity="0.6"/>

  <!-- Lock shackle -->
  <path d="M22 30 L22 23 Q22 16 32 16 Q42 16 42 23 L42 30" 
        fill="none" stroke="url(#gold)" stroke-width="4" 
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Keyhole -->
  <circle cx="32" cy="38" r="3.5" fill="#0a0a0b" opacity="0.8"/>
  <rect x="30.5" y="38" width="3" height="6" rx="1" fill="#0a0a0b" opacity="0.8"/>

  <!-- Subtle sparkle dots -->
  <circle cx="32" cy="32" r="1" fill="#e8c96d" opacity="0.4"/>
</svg>
